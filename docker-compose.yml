version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - barbershop_data:/app/data
      - barbershop_backups:/app/backups
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  barbershop_data:
  barbershop_backups:
